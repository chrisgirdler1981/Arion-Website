   <section id="contact-form">
  

  <form action="https://formspree.io/f/xykbvbjz" method="POST">

    <label for="name">Full Name</label>
    <input type="text" id="name" name="name" required>

    <label for="business">Business Name</label>
    <input type="text" id="business" name="business">

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone">

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required></textarea>

    <button type="submit">Send Message</button>

  </form>
</section>
  <footer>
    <ul class="social-networks">
      <li><a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i> </a></li>
      <li><a href="https://www.twitter.com" target="_blank"><i class="fa-brands fa-twitter"></i></i> </a></li>
      <li><a href="https://www.youtube.com" target="_blank"><i class="fa-brands fa-youtube"></i></i> </a></li>
      <li><a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></i> </a></li>
    </ul> 
  </footer>
